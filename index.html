<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIBEKISS | Legal</title>
  <style>
    :root { --primary-pink: #ff3b5c; --bg-gray: #f9f9f9; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 20px; background-color: var(--bg-gray); color: #111;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container { max-width: 500px; margin: 0 auto; text-align: center; flex: 1; }
    h1 { font-size: 2.5rem; color: var(--primary-pink); margin-top: 40px; font-weight: 800; letter-spacing: 2px; }
    p.subtitle { color: #666; font-size: 1rem; margin-bottom: 40px; }
    
    .legal-list { list-style: none; padding: 0; }
    .legal-item { margin-bottom: 12px; }
    
    .legal-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; background: white; border-radius: 16px;
      text-decoration: none; color: #111; font-weight: 600; font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.1s ease;
    }
    
    .legal-link:active { 
      transform: scale(0.97); 
      background-color: #f0f0f0; 
    }
    
    .arrow { color: #ccc; font-size: 1.2rem; font-weight: bold; }

    /* Highlight the Delete option slightly differently to stand out for reviewers */
    .delete-link { border: 1px solid #ffebeb; }

    footer {
      margin-top: 60px;
      padding-bottom: 40px;
      text-align: center;
      font-size: 0.85rem;
      color: #999;
      line-height: 1.6;
    }
    .company-info {
      display: block;
      margin-top: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VIBEKISS</h1>
    <p class="subtitle">Legal & Safety Center</p>

    <nav class="legal-list">
      <div class="legal-item">
        <a href="privacy.html" class="legal-link">
          <span>Privacy Policy</span> 
          <span class="arrow">›</span>
        </a>
      </div>

      <div class="legal-item">
        <a href="terms.html" class="legal-link">
          <span>Terms of Service</span> 
          <span class="arrow">›</span>
        </a>
      </div>

      <div class="legal-item">
        <a href="community-guidelines.html" class="legal-link">
          <span>Community Guidelines</span> 
          <span class="arrow">›</span>
        </a>
      </div>

      <div class="legal-item">
        <a href="delete-account.html" class="legal-link delete-link">
          <span>Delete Account Request</span> 
          <span class="arrow">›</span>
        </a>
      </div>
    </nav>

    <footer>
      <div class="copyright">&copy; 2026 VIBEKISS</div>
      <div class="company-info">VIBEKISS is operated by THEWAY LIMITED, United Kingdom.</div>
    </footer>
  </div>
</body>
</html>
