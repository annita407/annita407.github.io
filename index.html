<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIBEKISS | Legal</title>
  <style>
    :root { --primary-pink: #ff3b5c; --bg-gray: #f9f9f9; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 20px; background-color: var(--bg-gray); color: #111;
    }
    .container { max-width: 500px; margin: 0 auto; text-align: center; }
    h1 { font-size: 2.5rem; color: var(--primary-pink); margin-top: 40px; font-weight: 800; }
    p { color: #666; font-size: 1rem; margin-bottom: 40px; }
    
    .legal-list { list-style: none; padding: 0; }
    .legal-item { margin-bottom: 12px; }
    
    .legal-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; background: white; border-radius: 16px;
      text-decoration: none; color: #111; font-weight: 600; font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.1s;
    }
    .legal-link:active { transform: scale(0.98); background: #eee; }
    .arrow { color: #ccc; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VIBEKISS</h1>
    <p>Legal & Safety Center</p>

    <div class="legal-list">
      <div class="legal-item">
        <a href="privacy.html" class="legal-link">Privacy Policy <span class="arrow">›</span></a>
      </div>
      <div class="legal-item">
        <a href="terms.html" class="legal-link">Terms of Service <span class="arrow">›</span></a>
      </div>
      <div class="legal-item">
        <a href="community-guidelines.html" class="legal-link">Community Guidelines <span class="arrow">›</span></a>
      </div>
    </div>
  </div>
</body>
</html>
